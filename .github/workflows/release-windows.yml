name: Build Windows Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        default: "v4.6.1"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: python -m pip install -r build/requirements-build.txt

      - name: Build Windows packages
        shell: pwsh
        run: .\build\build_exe.ps1

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: SHTUCodeProxy ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body_path: release/README-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}.txt
          files: |
            release/SHTUCodeProxy-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}-windows-x64.exe
            release/SHTUCodeProxy-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}-windows-x64.zip
            release/SHTUCodeProxy-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}-source-linux-macos.zip
            release/SHA256SUMS.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}